name: Dimicraft
version: 0.3.8
main: kr.dimigo.dimicraft.Main
api-version: '26.1.2'
# UUID 마이그레이션이 다른 플러그인이 유저 데이터를 읽기 전에 끝나도록 먼저 로드한다.
loadbefore: [DiscordSRV, AuthMe, CoreProtect, DeadChest, Skript]
commands:
  dimicraft:
    description: 디미크래프트 관리 명령어
    usage: /dimicraft <reload|migrate|coords|recover-spawns>
    permission: dimicraft.admin

permissions:
  dimicraft.admin:
    description: 디미크래프트 관리 명령어를 사용합니다
    default: op
